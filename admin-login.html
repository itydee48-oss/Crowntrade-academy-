<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Crown Trade Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<script src="api.js"></script>
<style>
:root{--nude-light:#F9F6F2;--nude-med:#E8DFD6;--gold:#C8A97E;--gold-dark:#B89463;--charcoal:#2e2e2e;--muted:#7A7A7A;--danger:#EF4444;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Montserrat',sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#2d2d44 50%,#3a3a3a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.3);border-top:4px solid var(--gold);}
.logo-area{text-align:center;margin-bottom:30px;}
.logo-icon{width:64px;height:64px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:1.8rem;color:#fff;}
.logo-text{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:700;color:var(--charcoal);}
.logo-sub{color:var(--muted);font-size:0.85rem;margin-top:4px;}
.admin-badge{display:inline-block;background:#FEF3C7;color:#92400E;font-size:0.75rem;font-weight:700;padding:3px 10px;border-radius:20px;margin-top:8px;}
.form-group{margin-bottom:18px;}
.form-label{display:block;margin-bottom:7px;font-weight:600;font-size:0.85rem;color:var(--charcoal);letter-spacing:0.3px;}
.input-wrap{position:relative;}
.form-control{width:100%;padding:11px 40px 11px 14px;border:1px solid rgba(212,200,188,0.6);border-radius:9px;font-family:'Montserrat',sans-serif;font-size:0.92rem;color:var(--charcoal);transition:all 0.3s;background:var(--nude-light);}
.form-control:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,169,126,0.12);background:#fff;}
.toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:0.9rem;}
.btn-primary{width:100%;padding:13px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#fff;border:none;border-radius:9px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:0.95rem;cursor:pointer;transition:all 0.3s;letter-spacing:0.5px;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(200,169,126,0.35);}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.alert{padding:11px 14px;margin-bottom:16px;font-size:0.88rem;border-radius:8px;border-left:3px solid;}
.alert-error{background:#FEF2F2;border-color:var(--danger);color:#991B1B;}
.alert-success{background:#F0FDF4;border-color:#10B981;color:#065F46;}
.divider{border:none;border-top:1px solid rgba(212,200,188,0.4);margin:20px 0;}
.back-link{display:block;text-align:center;color:var(--muted);font-size:0.85rem;text-decoration:none;transition:color 0.3s;}
.back-link:hover{color:var(--gold-dark);}
.security-note{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);border-radius:8px;padding:10px 13px;font-size:0.8rem;color:#991B1B;display:flex;align-items:flex-start;gap:8px;margin-top:12px;}
</style>
</head>
<body>
  <div class="login-card">
    <div class="logo-area">
      <div class="logo-icon"><i class="fas fa-crown"></i></div>
      <div class="logo-text">Crown Trade Academy</div>
      <div class="logo-sub">Administration Panel</div>
      <div class="admin-badge"><i class="fas fa-shield-alt"></i> ADMIN ACCESS</div>
    </div>

    <div id="login-alert" style="display:none;" class="alert"></div>

    <div class="form-group">
      <label class="form-label">Username</label>
      <div class="input-wrap">
        <input type="text" id="username" class="form-control" placeholder="Admin username" autocomplete="username">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" class="form-control" placeholder="Admin password" autocomplete="current-password">
        <button class="toggle-pw" type="button" onclick="togglePw()"><i class="fas fa-eye" id="eyeIcon"></i></button>
      </div>
    </div>

    <button class="btn-primary" id="loginBtn" onclick="doLogin()">
      <i class="fas fa-sign-in-alt"></i>&nbsp; Sign In
    </button>

    <div class="security-note">
      <i class="fas fa-lock" style="margin-top:1px;flex-shrink:0;"></i>
      <span>This is a restricted admin area. Unauthorized access attempts are logged.</span>
    </div>

    <hr class="divider">
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Homepage</a>
  </div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  // Redirect if already logged in as admin
  const user = getUser();
  if (getToken() && user && user.role === 'admin') {
    window.location.href = 'admin-dashboard.html';
  }
});

function showAlert(msg, type = 'error') {
  const el = document.getElementById('login-alert');
  el.className = `alert alert-${type}`;
  el.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-triangle' : 'check-circle'}"></i> ${msg}`;
  el.style.display = 'block';
}

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');

  if (!username || !password) { showAlert('Please enter username and password'); return; }

  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying…';
  document.getElementById('login-alert').style.display = 'none';

  try {
    const data = await API.adminLogin(username, password);
    setToken(data.token);
    setUser(data.user);
    showAlert('Access granted. Redirecting…', 'success');
    setTimeout(() => window.location.href = 'admin-dashboard.html', 700);
  } catch (err) {
    showAlert(err.message || 'Invalid credentials');
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i>&nbsp; Sign In';
  }
}

function togglePw() {
  const input = document.getElementById('password');
  const icon = document.getElementById('eyeIcon');
  input.type = input.type === 'password' ? 'text' : 'password';
  icon.className = input.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
