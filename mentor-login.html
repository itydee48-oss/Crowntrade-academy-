<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentor Login — Crown Trade Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<script src="api.js"></script>
<style>
:root{--nude-light:#F9F6F2;--nude-med:#E8DFD6;--gold:#C8A97E;--gold-dark:#B89463;--charcoal:#2e2e2e;--muted:#7A7A7A;--danger:#EF4444;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Montserrat',sans-serif;background:linear-gradient(135deg,#1C2B3A 0%,#2d3a4a 50%,#3a3a3a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
h1,h2,h3{font-family:'Cormorant Garamond',serif;font-weight:600;}
.login-card{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.3);border-top:4px solid var(--gold);}
.logo-area{text-align:center;margin-bottom:28px;}
.logo-icon{width:64px;height:64px;background:linear-gradient(135deg,#2d3a4a,#1C2B3A);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:1.8rem;color:var(--gold);}
.logo-text{font-size:1.7rem;color:var(--charcoal);}
.logo-sub{color:var(--muted);font-size:0.85rem;margin-top:4px;}
.mentor-badge{display:inline-block;background:#EFF6FF;color:#1E40AF;font-size:0.75rem;font-weight:700;padding:3px 10px;border-radius:20px;margin-top:8px;}
.form-group{margin-bottom:18px;}
.form-label{display:block;margin-bottom:7px;font-weight:600;font-size:0.85rem;color:var(--charcoal);}
.input-wrap{position:relative;}
.form-control{width:100%;padding:11px 40px 11px 14px;border:1px solid rgba(212,200,188,0.6);border-radius:9px;font-family:'Montserrat',sans-serif;font-size:0.92rem;color:var(--charcoal);transition:all 0.3s;background:var(--nude-light);}
.form-control:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,169,126,0.12);background:#fff;}
.toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);}
.btn-primary{width:100%;padding:13px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#fff;border:none;border-radius:9px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:0.95rem;cursor:pointer;transition:all 0.3s;letter-spacing:0.5px;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(200,169,126,0.35);}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.alert{padding:11px 14px;margin-bottom:16px;font-size:0.88rem;border-radius:8px;border-left:3px solid;}
.alert-error{background:#FEF2F2;border-color:var(--danger);color:#991B1B;}
.alert-success{background:#F0FDF4;border-color:#10B981;color:#065F46;}
.divider{border:none;border-top:1px solid rgba(212,200,188,0.4);margin:20px 0;}
.back-link{display:block;text-align:center;color:var(--muted);font-size:0.85rem;text-decoration:none;}
.back-link:hover{color:var(--gold-dark);}
.info-box{background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.2);border-radius:8px;padding:10px 13px;font-size:0.8rem;color:#1E40AF;margin-bottom:16px;}
</style>
</head>
<body>
  <div class="login-card">
    <div class="logo-area">
      <div class="logo-icon"><i class="fas fa-chalkboard-teacher"></i></div>
      <div class="logo-text">Crown Trade Academy</div>
      <div class="logo-sub">Mentor Portal</div>
      <div class="mentor-badge"><i class="fas fa-star"></i> MENTOR ACCESS</div>
    </div>

    <div class="info-box"><i class="fas fa-info-circle"></i> Mentor accounts are created by the admin. Contact <strong>crowntradeacademy@gmail.com</strong> if you need access.</div>
    <div id="login-alert" style="display:none;" class="alert"></div>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" id="email" class="form-control" placeholder="mentor@email.com">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" class="form-control" placeholder="Your password">
        <button class="toggle-pw" onclick="togglePw()"><i class="fas fa-eye" id="eyeIcon"></i></button>
      </div>
    </div>

    <button class="btn-primary" id="loginBtn" onclick="doLogin()">
      <i class="fas fa-sign-in-alt"></i>&nbsp; Sign In
    </button>
    <hr class="divider">
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Homepage</a>
  </div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const user = getUser();
  if (getToken() && user && user.role === 'mentor') {
    window.location.href = 'mentor-dashboard.html';
  }
});

function showAlert(msg, type = 'error') {
  const el = document.getElementById('login-alert');
  el.className = `alert alert-${type}`;
  el.innerHTML = `<i class="fas fa-${type==='error'?'exclamation-triangle':'check-circle'}"></i> ${msg}`;
  el.style.display = 'block';
}

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');

  if (!email || !password) { showAlert('Please enter email and password'); return; }

  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in…';
  document.getElementById('login-alert').style.display = 'none';

  try {
    const data = await API.login(email, password);
    if (data.user.role !== 'mentor') {
      showAlert('This login is for mentors only.');
      logout();
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i>&nbsp; Sign In';
      return;
    }
    setToken(data.token);
    setUser(data.user);
    showAlert('Access granted. Redirecting…', 'success');
    setTimeout(() => window.location.href = 'mentor-dashboard.html', 700);
  } catch (err) {
    showAlert(err.message || 'Invalid credentials');
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i>&nbsp; Sign In';
  }
}

function togglePw() {
  const inp = document.getElementById('password');
  const icon = document.getElementById('eyeIcon');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  icon.className = inp.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
