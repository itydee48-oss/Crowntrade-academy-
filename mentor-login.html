<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crown Trade Academy — Mentor Login</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<script src="api.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Montserrat',sans-serif;background:linear-gradient(135deg,#1C1C1E 0%,#2d2d35 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
h1,h2{font-family:'Cormorant Garamond',serif;}
.login-box{background:#fff;border-radius:18px;padding:42px 38px;max-width:420px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.35);}
.logo{text-align:center;margin-bottom:28px;}
.crown{font-size:2.4rem;color:#C8A97E;display:block;margin-bottom:8px;}
.brand{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:700;color:#1C1C1E;}
.brand-sub{font-size:.72rem;text-transform:uppercase;letter-spacing:2px;color:#888;margin-top:2px;}
.role-tag{display:inline-block;background:rgba(200,169,126,.1);border:1px solid rgba(200,169,126,.3);color:#B89463;font-size:.72rem;font-weight:700;padding:4px 12px;border-radius:20px;margin-top:8px;letter-spacing:1px;}
h2{font-size:1.5rem;color:#1C1C1E;margin-bottom:6px;margin-top:22px;}
.subtitle{font-size:.82rem;color:#888;margin-bottom:22px;}
.field{margin-bottom:16px;}
.field label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#888;display:block;margin-bottom:6px;}
.input-wrap{position:relative;}
.input-wrap i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#C8A97E;font-size:.85rem;}
.field input{width:100%;padding:11px 12px 11px 36px;border:1.5px solid #E8DFD6;border-radius:9px;font-family:'Montserrat',sans-serif;font-size:.88rem;outline:none;transition:border .2s;background:#FAFAF8;}
.field input:focus{border-color:#C8A97E;background:#fff;}
.btn-login{width:100%;padding:12px;background:#C8A97E;color:#fff;border:none;border-radius:9px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;margin-top:6px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-login:hover{background:#B89463;transform:translateY(-1px);}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.error-msg{background:#FEE2E2;border:1px solid #FECACA;color:#991B1B;padding:10px 13px;border-radius:8px;font-size:.8rem;margin-bottom:14px;display:none;}
.back-link{text-align:center;margin-top:18px;font-size:.8rem;color:#888;}
.back-link a{color:#C8A97E;font-weight:600;}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <i class="fas fa-crown crown"></i>
    <div class="brand">Crown Trade Academy</div>
    <div class="brand-sub">Mentor Portal</div>
    <span class="role-tag"><i class="fas fa-user-tie"></i> Mentor Access</span>
  </div>
  <h2>Welcome back</h2>
  <p class="subtitle">Sign in to your mentor dashboard</p>
  <div class="error-msg" id="errorMsg"></div>
  <div class="field">
    <label>Email Address</label>
    <div class="input-wrap">
      <i class="fas fa-envelope"></i>
      <input type="email" id="email" placeholder="mentor@example.com" autocomplete="email">
    </div>
  </div>
  <div class="field">
    <label>Password</label>
    <div class="input-wrap">
      <i class="fas fa-lock"></i>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
  </div>
  <button class="btn-login" id="loginBtn" onclick="doLogin()">
    <i class="fas fa-sign-in-alt"></i> Sign In
  </button>
  <div class="back-link">
    <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Academy</a>
  </div>
</div>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (getToken()) {
    const u = getUser();
    if (u?.type === 'mentor') { window.location.href = 'mentor-dashboard.html'; return; }
  }
  document.getElementById('password').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
  document.getElementById('email').addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('password').focus(); });
});

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorMsg');
  err.style.display = 'none';
  if (!email || !password) { showError('Please enter your email and password.'); return; }
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in…';
  try {
    const data = await API.mentorLogin(email, password);
    setToken(data.token);
    setUser({ ...data.mentor, type: 'mentor' });
    window.location.href = 'mentor-dashboard.html';
  } catch(e) {
    showError(e.message || 'Invalid email or password.');
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
  }
}
function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
