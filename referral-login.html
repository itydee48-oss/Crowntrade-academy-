<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Referral Agent Login — Crown Trade Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="api.js"></script>
<style>
:root{--nude-light:#F9F6F2;--nude-medium:#E8DFD6;--nude-dark:#D4C8BC;--gold:#C8A97E;--charcoal:#3A3A3A;--text-light:#7A7A7A;--transition:all 0.4s cubic-bezier(0.165,0.84,0.44,1);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',sans-serif;background:linear-gradient(135deg,var(--nude-light) 0%,var(--nude-medium) 100%);min-height:100vh;display:flex;flex-direction:column;}
h1,h2,h3{font-family:'Cormorant Garamond',serif;font-weight:600;}
.premium-header{background:rgba(249,246,242,0.95);backdrop-filter:blur(10px);border-bottom:1px solid rgba(212,200,188,0.3);padding:1.2rem 2rem;}
.premium-nav{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto;}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:700;color:var(--charcoal);text-decoration:none;}
.main-content{flex:1;display:flex;align-items:center;justify-content:center;padding:3rem 1.5rem;}
.login-card{background:var(--nude-light);border:1px solid var(--nude-medium);padding:3rem;max-width:440px;width:100%;box-shadow:0 10px 30px rgba(0,0,0,0.07);position:relative;}
.login-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:var(--gold);}
.card-icon{text-align:center;font-size:3rem;color:var(--gold);margin-bottom:1rem;}
.card-title{font-size:2rem;text-align:center;margin-bottom:0.3rem;}
.card-subtitle{text-align:center;color:var(--text-light);font-size:0.9rem;margin-bottom:2rem;}
.form-group{margin-bottom:1.4rem;}
.form-label{display:block;margin-bottom:0.5rem;font-size:0.85rem;font-weight:500;letter-spacing:0.5px;}
.form-control{width:100%;padding:0.9rem 1rem;border:1px solid var(--nude-medium);background:var(--nude-light);font-family:'Montserrat',sans-serif;font-size:0.95rem;color:var(--charcoal);transition:var(--transition);}
.form-control:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 2px rgba(200,169,126,0.2);}
.btn-primary{width:100%;padding:1rem;background:var(--gold);color:var(--nude-light);border:1px solid var(--gold);font-family:'Montserrat',sans-serif;font-size:0.95rem;font-weight:500;letter-spacing:1px;cursor:pointer;transition:var(--transition);}
.btn-primary:hover{background:transparent;color:var(--gold);}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;}
.alert{padding:0.9rem 1rem;margin-bottom:1.2rem;font-size:0.9rem;border-left:3px solid;}
.alert-error{background:#fdf0f0;border-color:#e74c3c;color:#c0392b;}
.alert-success{background:#f0fdf4;border-color:#2ecc71;color:#27ae60;}
.info-box{background:var(--nude-medium);border-left:3px solid var(--gold);padding:1rem;margin-bottom:1.5rem;font-size:0.88rem;color:var(--charcoal);}
.link-row{text-align:center;margin-top:1.2rem;font-size:0.88rem;color:var(--text-light);}
.link-row a{color:var(--gold);text-decoration:none;font-weight:500;}
footer{background:var(--charcoal);text-align:center;padding:1.5rem;color:var(--nude-dark);font-size:0.85rem;}
</style>
</head>
<body>
<header class="premium-header">
  <nav class="premium-nav">
    <a href="index.html" class="logo">Crown Trade Academy</a>
    <a href="index.html" style="color:var(--text-light);text-decoration:none;font-size:0.9rem;">← Back to Home</a>
  </nav>
</header>
<main class="main-content">
  <div class="login-card">
    <div class="card-icon"><i class="fas fa-users"></i></div>
    <h2 class="card-title">Referral Agent Login</h2>
    <p class="card-subtitle">Access your referral dashboard</p>
    <div class="info-box"><i class="fas fa-info-circle"></i> Use your registered email and the referral code you received after approval.</div>
    <div id="login-alert" style="display:none;" class="alert"></div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" id="email" class="form-control" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label class="form-label">Your Referral Code</label>
      <input type="text" id="code" class="form-control" placeholder="e.g. JOHN1A2B" style="text-transform:uppercase;">
    </div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">
      <i class="fas fa-sign-in-alt"></i>&nbsp; Sign In
    </button>
    <div class="link-row" style="margin-top:1rem;">Not yet a referral agent? <a href="referral-register.html">Apply here</a></div>
    <div class="link-row">Client login? <a href="login.html">Click here</a></div>
  </div>
</main>
<footer>&copy; 2025 Crown Trade Academy. All rights reserved.</footer>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (getToken()) {
    const user = getUser();
    if (user && user.role === 'referral') window.location.href = 'referral-dashboard.html';
  }
});

function showAlert(msg, type='error') {
  const el = document.getElementById('login-alert');
  el.className = `alert alert-${type}`;
  el.innerHTML = `<i class="fas fa-${type==='error'?'exclamation-circle':'check-circle'}"></i> ${msg}`;
  el.style.display = 'block';
}

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const code = document.getElementById('code').value.trim().toUpperCase();
  const btn = document.getElementById('login-btn');
  if (!email||!code) { showAlert('Please enter your email and referral code'); return; }
  btn.disabled=true;
  btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Signing in...';
  document.getElementById('login-alert').style.display='none';
  try {
    const data = await API.referralLogin(email, code);
    setToken(data.token); setUser(data.user);
    showAlert('Login successful! Redirecting...','success');
    setTimeout(() => window.location.href='referral-dashboard.html', 800);
  } catch(err) {
    showAlert(err.message||'Login failed');
    btn.disabled=false;
    btn.innerHTML='<i class="fas fa-sign-in-alt"></i>&nbsp; Sign In';
  }
}

document.addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
</script>
</body>
</html>
